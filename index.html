<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>ROFREICRC v12.2 - REPAIRED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1e3a5f; --secondary: #2c5282; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --light: #f8f9fa; --dark: #343a40; --info: #17a2b8; }
        body{font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; background:#f0f2f5; color:#333;}
        header{background: var(--primary); color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold;}
        .container{padding:15px; max-width: 1100px; margin: auto;}
        .menu{margin-bottom:20px; display:flex; flex-wrap:wrap; gap:5px;}
        .menu button{padding:12px; background: var(--primary); color:white; border:none; cursor:pointer; flex:1; border-radius:5px; font-weight: bold; min-width: 50px;}
        .sec{background:white; padding:20px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display:none;}
        .filter-box { background: #e9ecef; padding: 12px; border-radius: 8px; margin: 10px 0 15px 0; display: flex; flex-wrap: wrap; gap: 8px; border: 1px solid #dee2e6; }
        .filter-box input, .filter-box select { flex: 1; min-width: 130px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;}
        .card{background:#fff; padding:15px; margin-bottom:12px; border-radius:8px; border-left:6px solid var(--primary); box-shadow:0 2px 5px rgba(0,0,0,0.05);}
        .sub-card { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; margin-top: 5px; border-radius: 5px; font-size: 13px; }
        input, select, textarea { width:100%; padding:12px; margin:5px 0 12px 0; border:1px solid #ccc; border-radius:5px; box-sizing: border-box; }
        .btn-main{ background: var(--success); color:white; border:none; padding:15px; width:100%; border-radius:5px; cursor:pointer; font-weight:bold; }
        .btn-group { display: flex; gap: 4px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 11px; font-weight: bold;}
        .btn-edit { background: var(--warning); color: black !important; }
        .btn-del { background: var(--danger); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); }
        .modal-content { background:white; margin:5% auto; padding:20px; width:90%; max-width:600px; border-radius:10px; max-height: 85vh; overflow-y: auto; }
        #toast { display:none; position:fixed; top:20px; right:20px; background:var(--success); color:white; padding:12px 20px; border-radius:8px; z-index:2000; font-weight:bold; }
    </style>
</head>
<body onload="syncCloud()">

<div id="toast">Operação concluída! ✅</div>
<header>ROFREICRC v12.2 - TIME & LOGISTICS</header>

<div class="container">
    <div id="login" class="sec" style="display:block">
        <h2>Acesso à Cloud</h2>
        <input id="user" placeholder="Utilizador">
        <input id="pass" type="password" placeholder="Palavra-passe">
        <button class="btn-main" onclick="login()">ENTRAR</button>
    </div>

    <div id="app" style="display:none">
        <div class="menu">
            <button onclick="show('obras')">🏗️</button>
            <button onclick="show('hrs')">🕒</button>
            <button onclick="show('obs')">📝</button>
            <button onclick="show('ped')">🛒</button>
            <button onclick="show('tar')">✅</button>
            <button id="menu-admin" onclick="show('users_admin')" style="display:none; background:var(--dark)">👥</button>
            <button onclick="logout()" style="background:var(--danger)">✖</button>
        </div>

        <div id="obras" class="sec">
            <h2 id="title-obras">🏗️ Gestão de Obras</h2>
            <div id="form-obra-admin" style="display:none">
                <input id="obra_num" placeholder="Nº da Obra">
                <input id="obra_nome" placeholder="Nome da Obra">
                <select id="obra_estado_input">
                    <option>Em execução</option>
                    <option>Finalizada</option>
                    <option>Sem efeito</option>
                </select>
                <button class="btn-main" onclick="guardarRegistro('obras')">Gravar Obra</button>
            </div>
            <div class="filter-box">
                <input id="f_o_num" placeholder="Filtrar Nº..." oninput="renderAll()">
                <input id="f_o_nom" placeholder="Filtrar Nome..." oninput="renderAll()">
            </div>
            <div id="lista_obras"></div>
        </div>

        <div id="hrs" class="sec">
            <h2 id="title-hrs">🕒 Registo de Horas</h2>
            <div id="form-horas">
                <label>Data:</label><input type="date" id="hrs_data">
                <label>Obra:</label><select id="hrs_obra"></select>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Início:</label><input type="time" id="hrs_inicio"></div>
                    <div style="flex:1"><label>Fim:</label><input type="time" id="hrs_fim"></div>
                </div>
                <label>Tarefas:</label><textarea id="hrs_tarefas" placeholder="O que fez nesta obra?"></textarea>
                
                <div id="admin-status-area" style="display:none; background:#f0f2f5; padding:10px; border-radius:5px; margin-bottom:10px; border:1px solid #ccc;">
                    <label><b>Estado da Aprovação (Admin):</b></label>
                    <select id="hrs_estado_admin">
                        <option>Por aprobar</option>
                        <option>Aprovado</option>
                        <option>Solicita alteração</option>
                    </select>
                </div>
                <button class="btn-main" onclick="guardarHoras()">Gravar Intervenção</button>
            </div>

            <div class="filter-box">
                <input type="date" id="f_hrs_dia" oninput="renderAll()">
                <input id="f_hrs_user" placeholder="Trabalhador..." oninput="renderAll()">
                <select id="f_hrs_est" onchange="renderAll()">
                    <option value="">Todos os Estados</option>
                    <option>Por aprobar</option>
                    <option>Aprovado</option>
                    <option>Solicita alteração</option>
                </select>
            </div>
            <div id="lista_horas"></div>
        </div>

        <div id="obs" class="sec">
            <h2 id="title-obs">📝 Observações</h2>
            <select id="obs_obra"></select>
            <textarea id="obs_desc" placeholder="Descreva a observação..."></textarea>
            <select id="obs_estado"><option>Por Resolver</option><option>Resolvido</option><option>Sem efeito</option></select>
            <button class="btn-main" onclick="guardarRegistro('obs')">Gravar Observação</button>
            <div id="lista_obs"></div>
        </div>

        <div id="ped" class="sec">
            <h2 id="title-ped">🛒 Pedidos</h2>
            <select id="ped_obra"></select>
            <input id="ped_mat" placeholder="Material"><input id="ped_qtd" placeholder="Qtd">
            <input id="ped_enc" placeholder="Nota Enc.">
            <input id="ped_guia" placeholder="Guia (Obrigatório se Entregue)">
            <select id="ped_estado"><option>Solicitado</option><option>Aprovado</option><option>Entregue</option><option>Sem efeito</option></select>
            <button class="btn-main" onclick="guardarRegistro('ped')">Gravar Pedido</button>
            <div id="lista_ped"></div>
        </div>

        <div id="tar" class="sec">
            <h2 id="title-tar">✅ Tarefas</h2>
            <select id="tar_obra"></select>
            <input id="tar_tit" placeholder="Título da tarefa">
            <select id="tar_para" multiple></select>
            <select id="tar_estado"><option>Por Executar</option><option>Executada</option><option>Sem efeito</option></select>
            <button class="btn-main" onclick="guardarRegistro('tar')">Gravar Tarefa</button>
            <div id="lista_tar"></div>
        </div>

        <div id="users_admin" class="sec">
            <h2>👥 Gestão de Utilizadores</h2>
            <input id="u_name" placeholder="Utilizador"><input id="u_pass" placeholder="Password">
            <select id="u_role"><option>Operacional</option><option>Administrador</option></select>
            <button class="btn-main" onclick="guardarUsuario()">Criar Utilizador</button>
            <div id="lista_users"></div>
        </div>
    </div>
</div>

<div id="modal-notas" class="modal"><div class="modal-content"><h3>💬 Notas</h3><div id="lista-notas-content"></div><textarea id="nota-texto"></textarea><button class="btn-main" onclick="addNota()">Adicionar Nota</button><button onclick="closeModals()" style="width:100%; margin-top:10px">Fechar</button></div></div>
<div id="modal-hist" class="modal"><div class="modal-content"><h3>📜 Histórico</h3><div id="lista-hist-content"></div><button onclick="closeModals()" style="width:100%; margin-top:10px">Fechar</button></div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBkWCoWX0oN1HWCA6aGt_kdg_2vyFz1mM",
  authDomain: "rofreicrc-175f9.firebaseapp.com",
  databaseURL: "https://rofreicrc-175f9-default-rtdb.firebaseio.com",
  projectId: "rofreicrc-175f9",
  storageBucket: "rofreicrc-175f9.firebasestorage.app",
  messagingSenderId: "597226985528",
  appId: "1:597226985528:web:c371ca51032301e51feecd"
};
firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();

let db = { obras: [], obs: [], ped: [], tar: [], users: [], horas: [], notas: {}, historial: {} };
let currentUser = null, editId = null, currentRef = null, editSubId = null;

function syncCloud() {
    rtdb.ref('/').on('value', (snap) => {
        const d = snap.val() || {};
        db.obras = d.obras ? Object.values(d.obras) : [];
        db.obs = d.obs ? Object.values(d.obs) : [];
        db.ped = d.ped ? Object.values(d.ped) : [];
        db.tar = d.tar ? Object.values(d.tar) : [];
        db.users = d.users ? Object.values(d.users) : [];
        db.horas = d.horas ? Object.values(d.horas) : [];
        db.notas = d.notas || {};
        db.historial = d.historial || {};
        renderAll();
        updateSelects();
    });
}

function login() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();
    if(u === "admin" && p === "23778478") { currentUser = {u: "admin", role: "Administrador", status: "Ativo"}; }
    else { currentUser = db.users.find(x => x.u === u && x.p === p); }
    
    if(currentUser) {
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        if(currentUser.role === "Administrador") {
            document.getElementById("form-obra-admin").style.display="block";
            document.getElementById("menu-admin").style.display="block";
            document.getElementById("admin-status-area").style.display="block";
        }
    } else { alert("Acesso negado."); }
}

// --- FUNÇÃO PARA OBRAS, OBS, PEDIDOS, TAREFAS ---
function guardarRegistro(mod) {
    const id = editId || Date.now().toString();
    const isEdit = !!editId;
    let data = { id, updatedAt: new Date().toLocaleString() };

    if (mod === 'obras') {
        data.num = document.getElementById("obra_num").value.trim();
        data.nome = document.getElementById("obra_nome").value.trim();
        data.estado = document.getElementById("obra_estado_input").value;
        if(!data.num || !data.nome) return alert("Preencha Nº e Nome da Obra!");
    } else {
        const oId = document.getElementById(`${mod}_obra`).value;
        const obra = db.obras.find(o => o.id === oId);
        if(!obra) return alert("Selecione uma obra!");
        data.obraId = obra.id; data.obraNum = obra.num;

        if(mod === 'obs') { data.desc = document.getElementById("obs_desc").value; data.estado = document.getElementById("obs_estado").value; }
        if(mod === 'ped') {
            const est = document.getElementById("ped_estado").value;
            const guia = document.getElementById("ped_guia").value.trim();
            if(est === 'Entregue' && !guia) return alert("Erro: Nº de Guia obrigatório para estado 'Entregue'!");
            data.mat = document.getElementById("ped_mat").value;
            data.qtd = document.getElementById("ped_qtd").value;
            data.enc = document.getElementById("ped_enc").value;
            data.guia = guia;
            data.estado = est;
        }
        if(mod === 'tar') {
            data.tit = document.getElementById("tar_tit").value;
            data.para = Array.from(document.getElementById("tar_para").selectedOptions).map(o => o.value);
            data.estado = document.getElementById("tar_estado").value;
        }
    }

    rtdb.ref(`${mod}/${id}`).set(data).then(() => {
        rtdb.ref(`historial/${id}`).push({ quem: currentUser.u, quando: data.updatedAt, info: isEdit ? "Editou" : "Criou" });
        cancelarEdicao();
        showToast();
    });
}

// --- FUNÇÃO PARA REGISTO DE HORAS (MÓDULO + SUBMÓDULO) ---
function guardarHoras() {
    const dataTrabalho = document.getElementById("hrs_data").value;
    const obraId = document.getElementById("hrs_obra").value;
    const ini = document.getElementById("hrs_inicio").value;
    const fim = document.getElementById("hrs_fim").value;
    const t = document.getElementById("hrs_tarefas").value;

    if(!dataTrabalho || !obraId || !ini || !fim) return alert("Preencha todos os campos das horas!");

    // ID único por trabalhador e dia
    const regId = editId || `${currentUser.u}_${dataTrabalho.replace(/-/g,'')}`;
    let registro = db.horas.find(h => h.id === regId) || { 
        id: regId, user: currentUser.u, data: dataTrabalho, estado: "Por aprobar", intervenciones: [] 
    };

    // Bloqueio se aprovado
    if(registro.estado === 'Aprovado' && currentUser.role !== 'Administrador') return alert("Registo Aprovado. Não pode editar.");

    const obra = db.obras.find(o => o.id === obraId);
    const diff = (new Date(`1970-01-01T${fim}`) - new Date(`1970-01-01T${ini}`)) / 3600000;

    const novaIntervencao = {
        subId: editSubId || Date.now().toString(),
        obraId, obraNum: obra.num, obraNome: obra.nome,
        inicio: ini, fim: fim, tareas: t, horas: diff
    };

    if(editSubId) {
        const idx = registro.intervenciones.findIndex(i => i.subId === editSubId);
        registro.intervenciones[idx] = novaIntervencao;
    } else {
        registro.intervenciones.push(novaIntervencao);
    }

    if(currentUser.role === 'Administrador') registro.estado = document.getElementById("hrs_estado_admin").value;

    rtdb.ref(`horas/${regId}`).set(registro).then(() => {
        cancelarEdicao();
        showToast();
    });
}

function renderAll() {
    // Render Obras
    const foN = document.getElementById("f_o_num").value.toLowerCase();
    const foM = document.getElementById("f_o_nom").value.toLowerCase();
    renderModulo('obras', 'lista_obras', o => `<b>${o.num} - ${o.nome}</b><br><small>${o.estado}</small>`, o => o.num.toLowerCase().includes(foN) && o.nome.toLowerCase().includes(foM));

    // Render Horas
    const fHd = document.getElementById("f_hrs_dia").value;
    const fHu = document.getElementById("f_hrs_user").value.toLowerCase();
    const fHe = document.getElementById("f_hrs_est").value;

    let hList = db.horas.filter(h => 
        (currentUser.role === 'Administrador' ? h.user.toLowerCase().includes(fHu) : h.user === currentUser.u) &&
        (!fHd || h.data === fHd) && (!fHe || h.estado === fHe)
    );
    hList.sort((a,b) => new Date(b.data) - new Date(a.data));

    document.getElementById("lista_horas").innerHTML = hList.map(h => {
        const total = h.intervenciones.reduce((acc, i) => acc + i.horas, 0);
        const lock = h.estado === 'Aprovado' && currentUser.role !== 'Administrador';
        return `<div class="card">
            <div style="display:flex; justify-content:space-between">
                <span><b>📅 ${h.data}</b> (${h.user})</span>
                <b style="color:var(--primary)">${total.toFixed(2)}h Total</b>
            </div>
            <span class="badge" style="background:${h.estado==='Aprovado'?'green':'orange'}">${h.estado}</span>
            ${h.intervenciones.map(i => `
                <div class="sub-card">
                    <b>Obra ${i.obraNum}</b>: ${i.inicio} às ${i.fim} (${i.horas.toFixed(2)}h)<br><i>${i.tareas}</i>
                    ${!lock ? `<div class="btn-group"><button class="btn-edit" onclick="prepararEdicaoHoras('${h.id}','${i.subId}')">✏️</button><button class="btn-del" onclick="eliminarSub('${h.id}','${i.subId}')">❌</button></div>`:''}
                </div>
            `).join("")}
            <div class="btn-group">
                <button class="btn-edit" style="background:#6c757d; color:white!important" onclick="openNotas('${h.id}')">💬 Notas</button>
                <button class="btn-edit" style="background:#17a2b8; color:white!important" onclick="openHistorial('${h.id}')">📜 Hist.</button>
            </div>
        </div>`;
    }).join("");

    // Outros renders
    renderModulo('obs', 'lista_obs', o => `<b>Obra ${o.obraNum}</b>: ${o.desc}`, o => true);
    renderModulo('ped', 'lista_ped', o => `<b>Obra ${o.obraNum}</b>: ${o.mat} | Guia: ${o.guia || '---'}`, o => true);
    renderModulo('tar', 'lista_tar', o => `<b>Obra ${o.obraNum}</b>: ${o.tit} para ${o.para}`, o => true);
}

function renderModulo(mod, target, template, filterFn) {
    const list = db[mod].filter(filterFn);
    document.getElementById(target).innerHTML = list.reverse().map(i => `
        <div class="card">${template(i)}
            <div class="btn-group">
                <button class="btn-edit" onclick="prepararEdicao('${mod}','${i.id}')">✏️</button>
                <button class="btn-del" onclick="eliminar('${mod}','${i.id}')">❌</button>
            </div>
        </div>`).join("");
}

function prepararEdicao(mod, id) {
    editId = id; show(mod);
    const item = db[mod].find(x => x.id === id);
    if(mod==='obras'){ document.getElementById("obra_num").value=item.num; document.getElementById("obra_nome").value=item.nome; document.getElementById("obra_estado_input").value=item.estado; }
    if(mod==='obs'){ document.getElementById("obs_obra").value=item.obraId; document.getElementById("obs_desc").value=item.desc; }
    if(mod==='ped'){ document.getElementById("ped_obra").value=item.obraId; document.getElementById("ped_mat").value=item.mat; document.getElementById("ped_guia").value=item.guia||''; }
    document.getElementById(`title-${mod}`).innerText = "✏️ Editando...";
}

function prepararEdicaoHoras(id, subId) {
    editId = id; editSubId = subId; show('hrs');
    const h = db.horas.find(x => x.id === id);
    const s = h.intervenciones.find(x => x.subId === subId);
    document.getElementById("hrs_data").value = h.data;
    document.getElementById("hrs_obra").value = s.obraId;
    document.getElementById("hrs_inicio").value = s.inicio;
    document.getElementById("hrs_fim").value = s.fim;
    document.getElementById("hrs_tarefas").value = s.tareas;
    if(currentUser.role === 'Administrador') document.getElementById("hrs_estado_admin").value = h.estado;
}

function eliminarSub(id, subId) {
    const h = db.horas.find(x => x.id === id);
    if(h.estado === 'Aprovado' && currentUser.role !== 'Administrador') return alert("Bloqueado");
    if(confirm("Eliminar esta intervenção?")) {
        h.intervenciones = h.intervenciones.filter(i => i.subId !== subId);
        if(h.intervenciones.length === 0) rtdb.ref(`horas/${id}`).remove();
        else rtdb.ref(`horas/${id}`).set(h);
    }
}

function updateSelects() {
    const active = db.obras.filter(o => o.estado === 'Em execução');
    const opt = '<option value="">Selecionar Obra...</option>' + active.map(o => `<option value="${o.id}">${o.num} - ${o.nome}</option>`).join("");
    ['obs_obra','ped_obra','tar_obra','hrs_obra'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = opt; });
    if(document.getElementById('tar_para')) document.getElementById('tar_para').innerHTML = db.users.map(u=>`<option value="${u.u}">${u.u}</option>`).join("");
}

function show(id) { document.querySelectorAll(".sec").forEach(s=>s.style.display="none"); document.getElementById(id).style.display="block"; }
function cancelarEdicao() { editId = null; editSubId = null; document.querySelectorAll('input, textarea').forEach(i=>i.value=""); document.querySelectorAll('h2').forEach(h => h.innerText = h.innerText.replace("✏️ Editando...", "")); }
function eliminar(path, id) { if(confirm("Apagar?")) rtdb.ref(`${path}/${id}`).remove(); }
function logout() { location.reload(); }
function showToast() { const t = document.getElementById("toast"); t.style.display="block"; setTimeout(()=>t.style.display="none", 2000); }
function closeModals() { document.querySelectorAll(".modal").forEach(m=>m.style.display="none"); }
function openNotas(id) { currentRef = id; document.getElementById("modal-notas").style.display="block"; renderNotas(); }
function renderNotas() { const n = Object.values(db.notas[currentRef] || {}); document.getElementById("lista-notas-content").innerHTML = n.map(x => `<div><b>${x.u}:</b> ${x.t}</div>`).join(""); }
function addNota() { const t = document.getElementById("nota-texto").value; if(t) rtdb.ref(`notas/${currentRef}`).push({ u: currentUser.u, t }).then(()=>document.getElementById("nota-texto").value=""); }
function openHistorial(id) { document.getElementById("modal-hist").style.display="block"; const h = Object.values(db.historial[id] || {}); document.getElementById("lista-hist-content").innerHTML = h.reverse().map(x => `<div style="font-size:12px"><b>${x.quando}</b>: ${x.info} (${x.quem})</div>`).join(""); }
</script>
</body>
</html>
