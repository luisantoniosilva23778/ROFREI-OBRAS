<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>ROFREICRC v16.0 - ERP ESTÁVEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --p: #1e293b; --s: #475569; --acc: #2563eb; --ok: #16a34a; --err: #dc2626; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); font-size: 13px; color: var(--p); }
        header { background: var(--p); color: white; padding: 15px; text-align: center; font-weight: bold; }
        
        /* Nav */
        nav { display: flex; flex-wrap: wrap; background: #fff; padding: 10px; gap: 5px; border-bottom: 1px solid #ddd; sticky: top; z-index: 100; }
        nav button { border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; background: var(--s); color: white; font-weight: bold; }
        nav button.active { background: var(--acc); }

        .container { padding: 20px; max-width: 1400px; margin: auto; }
        .section { display: none; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Forms */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 5px; font-size: 13px; box-sizing: border-box; }
        .btn-main { background: var(--ok); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table th { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; text-align: left; }
        table td { padding: 8px; border: 1px solid #e2e8f0; }

        /* Cards */
        .card { border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid var(--p); background: #fff; }
        .meta { font-size: 11px; color: #64748b; margin-top: 10px; }
        .actions { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .actions button { padding: 5px 10px; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 11px; }

        /* Modales */
        .modal { display:none; position:fixed; z-index:1000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background:white; width:90%; max-width:700px; margin: 5% auto; padding: 20px; border-radius: 8px; max-height: 80vh; overflow-y: auto; }

        #toast { display:none; position:fixed; bottom:20px; right:20px; background:var(--p); color:white; padding:15px 25px; border-radius:5px; z-index:2000; }
    </style>
</head>
<body>

<div id="toast">Operação realizada!</div>
<header>ROFREICRC v16.0 - GESTÃO INTEGRAL</header>

<div id="login-sec" class="container" style="max-width: 400px; margin-top: 100px;">
    <div class="section" style="display: block;">
        <h2 style="text-align: center;">Acesso</h2>
        <input type="text" id="log-u" placeholder="Utilizador" style="margin-bottom: 10px;">
        <input type="password" id="log-p" placeholder="Senha" style="margin-bottom: 15px;">
        <button class="btn-main" onclick="doLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display: none;">
    <nav>
        <button id="nav-obras" onclick="showMod('obras')">🏗️ OBRAS</button>
        <button id="nav-horas" onclick="showMod('horas')">🕒 HORAS</button>
        <button id="nav-obs" onclick="showMod('obs')">📝 OBS</button>
        <button id="nav-ne" onclick="showMod('ne')">📄 N.E.</button>
        <button id="nav-ped" onclick="showMod('ped')">🛒 PEDIDOS</button>
        <button id="nav-tar" onclick="showMod('tar')">✅ TAREFAS</button>
        <button id="nav-notif" onclick="showMod('notif')">🔔 NOTIF</button>
        <button id="nav-users" onclick="showMod('users')" style="background:var(--err)">👥 ADMIN</button>
        <button onclick="location.reload()" style="background:#000">SAIR</button>
    </nav>

    <div class="container">
        <section id="mod-obras" class="section">
            <h3>🏗️ Registo de Obra</h3>
            <div class="grid">
                <div><label>Nº Obra</label><input type="text" id="o-num"></div>
                <div><label>Nome da Obra</label><input type="text" id="o-nom"></div>
                <div><label>Estado</label>
                    <select id="o-est"><option>Em execução</option><option>Finalizada</option><option>Sem efeito</option></select>
                </div>
            </div>
            <button class="btn-main" onclick="saveGeneral('obras')">Gravar Obra</button>
            <button id="o-cancel" style="display:none; margin-top:5px;" onclick="cancelarEdit('obras')">Cancelar Edição</button>
            
            <hr style="margin: 20px 0;">
            <div class="grid">
                <input type="text" placeholder="Filtrar Nº..." oninput="filtrar('obras', 'num', this.value)">
                <input type="text" placeholder="Filtrar Nome..." oninput="filtrar('obras', 'nom', this.value)">
                <button onclick="exportarExcel('obras')" style="background:var(--ok); color:white; border:none; border-radius:5px;">Excel</button>
            </div>
            <div id="list-obras"></div>
        </section>

        <section id="mod-horas" class="section">
            <h3>🕒 Registo de Horas</h3>
            <div class="grid">
                <div><label>Data</label><input type="date" id="h-dat"></div>
                <div><label>Obra</label><select id="h-obr"></select></div>
                <div><label>Início</label><input type="time" id="h-ini"></div>
                <div><label>Fim</label><input type="time" id="h-fim"></div>
                <div style="grid-column: span 2;"><label>Tarefa</label><textarea id="h-task"></textarea></div>
                <div><label>Estado</label><select id="h-est" disabled><option>Por Aprobar</option><option>Aprobada</option><option>Requiere alteracion</option><option>Sem efeito</option></select></div>
            </div>
            <button class="btn-main" onclick="saveGeneral('horas')">Gravar Horas</button>
            <button id="h-cancel" style="display:none; margin-top:5px;" onclick="cancelarEdit('horas')">Cancelar Edición</button>
            <div id="list-horas"></div>
        </section>

        <section id="mod-ne" class="section">
            <h3>📄 Nota de Encomenda</h3>
            <div class="grid">
                <div><label>Nº Encomenda</label><input type="text" id="ne-num" readonly></div>
                <div><label>Obra</label><select id="ne-obr"></select></div>
                <div><label>Proveedor</label><input type="text" id="ne-prov"></div>
                <div><label>Estado</label><select id="ne-est"><option>Emitida</option><option>Enviada al proveedor</option><option>Sem efecto</option></select></div>
            </div>
            
            <table id="table-ne">
                <thead><tr><th>Cant</th><th>Unid</th><th>Producto</th><th>Precio Un.</th><th>Total</th><th>+</th><th>-</th></tr></thead>
                <tbody id="ne-body"></tbody>
            </table>

            <div class="grid" style="margin-top:15px">
                <div style="grid-column: span 2;"><label>Dirección Entrega</label><input type="text" id="ne-dir"></div>
                <div style="grid-column: span 2;"><label>Condiciones/Fechas</label><textarea id="ne-cond"></textarea></div>
            </div>
            <button class="btn-main" onclick="saveNE()">Gravar Nota de Encomenda</button>
            <button id="ne-cancel" style="display:none; margin-top:5px;" onclick="cancelarEdit('ne')">Cancelar Edición</button>
            <div id="list-ne"></div>
        </section>

        <section id="mod-obs" class="section"><h3>📝 Observações</h3><div id="list-obs"></div></section>
        <section id="mod-ped" class="section"><h3>🛒 Pedidos</h3><div id="list-ped"></div></section>
        <section id="mod-tar" class="section"><h3>✅ Tarefas</h3><div id="list-tar"></div></section>
        <section id="mod-notif" class="section"><h3>🔔 Notificações</h3><div id="list-notif"></div></section>
        <section id="mod-users" class="section"><h3>👥 Utilizadores</h3><div id="list-users"></div></section>
    </div>
</div>

<div id="modal-hist" class="modal"><div class="modal-content"><h3>Histórico de Edição</h3><div id="hist-body"></div><button onclick="closeModal('modal-hist')">Fechar</button></div></div>

<script>
// --- CONFIGURACIÓN ---
const firebaseConfig = {
  apiKey: "AIzaSyCBkWCoWX0oN1HWCA6aGt_kdg_2vyFz1mM",
  authDomain: "rofreicrc-175f9.firebaseapp.com",
  databaseURL: "https://rofreicrc-175f9-default-rtdb.firebaseio.com",
  projectId: "rofreicrc-175f9",
  storageBucket: "rofreicrc-175f9.firebasestorage.app",
  appId: "1:597226985528:web:c371ca51032301e51feecd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let DB = { obras:[], horas:[], ne:[], ped:[], tar:[], obs:[], users:[], notif:[], hist:{} };
let user = null;
let currentMod = 'obras';
let editingId = null;

// --- INICIO ---
function doLogin() {
    const u = document.getElementById('log-u').value;
    const p = document.getElementById('log-p').value;
    if(u === 'admin' && p === '23778478') {
        user = { u: 'admin', role: 'Administrador' };
    } else {
        user = DB.users.find(x => x.u === u && x.p === p && x.st === 'Ativo');
    }

    if(user) {
        document.getElementById('login-sec').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        if(user.role !== 'Administrador') document.getElementById('nav-users').style.display = 'none';
        sync();
    } else alert("Acesso negado");
}

function sync() {
    db.ref('/').on('value', snap => {
        const val = snap.val() || {};
        DB.obras = Object.values(val.obras || {});
        DB.horas = Object.values(val.horas || {});
        DB.ne = Object.values(val.ne || {});
        DB.ped = Object.values(val.ped || {});
        DB.tar = Object.values(val.tar || {});
        DB.obs = Object.values(val.obs || {});
        DB.users = Object.values(val.users || {});
        DB.notif = Object.values(val.notif || {});
        DB.hist = val.hist || {};
        
        updateSelects();
        render(currentMod);
        if(!editingId && currentMod === 'ne') autoNumNE();
    });
}

function showMod(mod) {
    currentMod = mod;
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(`mod-${mod}`).style.display = 'block';
    document.getElementById(`nav-${mod}`).classList.add('active');
    cancelarEdit(mod); // Limpieza total al cambiar
}

// --- LOGICA DE GUARDADO ---
async function saveGeneral(mod) {
    const id = editingId || `REC_${Date.now()}_${Math.floor(Math.random()*1000)}`;
    const isNew = !editingId;
    const old = isNew ? null : DB[mod].find(x => x.id === id);

    let data = {
        id,
        u: isNew ? user.u : old.u,
        ts_c: isNew ? new Date().toLocaleString() : old.ts_c,
        ts_e: new Date().toLocaleString()
    };

    if(mod === 'obras') {
        data.num = document.getElementById('o-num').value;
        data.nom = document.getElementById('o-nom').value;
        data.est = document.getElementById('o-est').value;
    } else if(mod === 'horas') {
        data.dat = document.getElementById('h-dat').value;
        data.obr = document.getElementById('h-obr').value;
        data.ini = document.getElementById('h-ini').value;
        data.fim = document.getElementById('h-fim').value;
        data.task = document.getElementById('h-task').value;
        data.est = isNew ? 'Por Aprobar' : document.getElementById('h-est').value;
    }

    const log = getLog(old, data);
    await db.ref(`${mod}/${id}`).set(data);
    if(log) await db.ref(`hist/${id}`).push({ u: user.u, ts: new Date().toLocaleString(), log });

    msg("Gravado!");
    cancelarEdit(mod);
}

// --- NOTAS DE ENCOMENDA ESPECIAL ---
function addNERow(v = {}) {
    const b = document.getElementById('ne-body');
    const r = document.createElement('tr');
    r.innerHTML = `
        <td><input type="number" class="q" value="${v.q||''}" oninput="calcNE(this)"></td>
        <td><input type="text" class="un" value="${v.un||''}"></td>
        <td><input type="text" class="p" value="${v.p||''}"></td>
        <td><input type="number" step="0.001" class="pr" value="${v.pr||''}" oninput="calcNE(this)"></td>
        <td class="t">${( (v.q||0)*(v.pr||0) ).toFixed(3)}</td>
        <td><button onclick="addNERow()">+</button></td>
        <td><button onclick="this.closest('tr').remove()">🗑️</button></td>
    `;
    b.appendChild(r);
}

function calcNE(el) {
    const r = el.closest('tr');
    const q = r.querySelector('.q').value || 0;
    const p = r.querySelector('.pr').value || 0;
    r.querySelector('.t').innerText = (q * p).toFixed(3);
}

async function saveNE() {
    const id = editingId || `NE_${Date.now()}`;
    const num = document.getElementById('ne-num').value;
    const obr = document.getElementById('ne-obr').value;
    const prov = document.getElementById('ne-prov').value;
    const items = Array.from(document.querySelectorAll('#ne-body tr')).map(r => ({
        q: r.querySelector('.q').value,
        un: r.querySelector('.un').value,
        p: r.querySelector('.p').value,
        pr: r.querySelector('.pr').value,
        t: r.querySelector('.t').innerText
    }));

    const data = {
        id, num, obr, prov, items, 
        est: document.getElementById('ne-est').value,
        dir: document.getElementById('ne-dir').value,
        cond: document.getElementById('ne-cond').value,
        u: user.u, ts_e: new Date().toLocaleString()
    };

    await db.ref(`ne/${id}`).set(data);
    
    // Sincronizar Pedidos
    items.forEach(async (it, idx) => {
        const pedId = `${id}_${idx}`;
        await db.ref(`ped/${pedId}`).set({
            id: pedId, obr, mat: it.p, q: it.q, prov, neRef: num,
            est: data.est === 'Emitida' ? 'Por Solicitar' : 'Enviado al proveedor'
        });
    });

    msg("NE e Pedidos sincronizados!");
    cancelarEdit('ne');
}

// --- HELPERS ---
function cancelarEdit(mod) {
    editingId = null;
    const sec = document.getElementById(`mod-${mod}`);
    sec.querySelectorAll('input, textarea').forEach(i => i.value = '');
    sec.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
    const btn = document.getElementById(`${mod === 'ne' ? 'ne' : mod[0]}-cancel`);
    if(btn) btn.style.display = 'none';

    if(mod === 'ne') {
        document.getElementById('ne-body').innerHTML = '';
        addNERow();
        autoNumNE();
    }
}

function autoNumNE() {
    const y = new Date().getFullYear();
    const count = DB.ne.filter(n => n.num && n.num.endsWith(y)).length;
    document.getElementById('ne-num').value = `NE${(count+1).toString().padStart(3,'0')}.${y}`;
}

function getLog(old, novo) {
    if(!old) return "Criação de registo";
    let diff = [];
    for(let k in novo) {
        if(['ts_e','u'].includes(k)) continue;
        if(JSON.stringify(old[k]) !== JSON.stringify(novo[k])) {
            diff.push(`${k}: ${old[k]} -> ${novo[k]}`);
        }
    }
    return diff.length > 0 ? diff.join(" | ") : null;
}

function render(mod) {
    const list = document.getElementById(`list-${mod}`);
    if(!list) return;
    list.innerHTML = '';
    
    let data = DB[mod];
    
    // Filtro seguridad Horas
    if(mod === 'horas' && user.role !== 'Administrador') {
        data = data.filter(x => x.u === user.u);
    }

    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <b>${item.num || item.id}</b> - ${item.nom || item.task || item.prov || ''} 
            <span style="float:right; color:var(--acc)">${item.est}</span>
            <div class="meta">Criado por: ${item.u} em ${item.ts_c || ''}</div>
            <div class="actions">
                <button style="background:var(--acc)" onclick="prepEdit('${mod}','${item.id}')">Editar</button>
                <button style="background:var(--s)" onclick="showHist('${item.id}')">Histórico</button>
                ${user.role === 'Administrador' ? `<button style="background:var(--err)" onclick="del('${mod}','${item.id}')">Eliminar</button>` : ''}
            </div>
        `;
        list.appendChild(card);
    });
}

function prepEdit(mod, id) {
    editingId = id;
    const item = DB[mod].find(x => x.id === id);
    document.getElementById(`${mod === 'ne' ? 'ne' : mod[0]}-cancel`).style.display = 'block';

    if(mod === 'obras') {
        document.getElementById('o-num').value = item.num;
        document.getElementById('o-nom').value = item.nom;
        document.getElementById('o-est').value = item.est;
    } else if(mod === 'horas') {
        document.getElementById('h-dat').value = item.dat;
        document.getElementById('h-obr').value = item.obr;
        document.getElementById('h-ini').value = item.ini;
        document.getElementById('h-fim').value = item.fim;
        document.getElementById('h-task').value = item.task;
        if(user.role === 'Administrador') document.getElementById('h-est').disabled = false;
    }
}

function updateSelects() {
    const exec = DB.obras.filter(o => o.est === 'Em execução');
    const opt = exec.map(o => `<option value="${o.id}">${o.num} - ${o.nom}</option>`).join('');
    ['h-obr', 'ne-obr'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.innerHTML = opt;
    });
}

function msg(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.style.display = 'block';
    setTimeout(()=> t.style.display='none', 3000);
}

function showHist(id) {
    const content = document.getElementById('hist-body');
    const h = DB.hist[id] ? Object.values(DB.hist[id]) : [];
    content.innerHTML = h.length ? h.map(x => `<p><b>${x.ts} (${x.u}):</b> ${x.log}</p>`).join('') : 'Sem histórico';
    document.getElementById('modal-hist').style.display = 'block';
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

async function del(mod, id) {
    if(confirm("Eliminar permanentemente?")) {
        await db.ref(`${mod}/${id}`).remove();
        msg("Eliminado");
    }
}
</script>
</body>
</html>
