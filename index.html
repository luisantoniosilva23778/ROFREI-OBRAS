<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>ROFREICRC v12.0 - TIME CONTROL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1e3a5f; --secondary: #2c5282; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --light: #f8f9fa; --dark: #343a40; --info: #17a2b8; }
        body{font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; background:#f0f2f5; color:#333;}
        header{background: var(--primary); color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold;}
        .container{padding:15px; max-width: 1100px; margin: auto;}
        .menu{margin-bottom:20px; display:flex; flex-wrap:wrap; gap:5px;}
        .menu button{padding:12px; background: var(--primary); color:white; border:none; cursor:pointer; flex:1; border-radius:5px; font-weight: bold;}
        .sec{background:white; padding:20px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display:none;}
        .filter-box { background: #e9ecef; padding: 12px; border-radius: 8px; margin: 10px 0 15px 0; display: flex; flex-wrap: wrap; gap: 8px; border: 1px solid #dee2e6; }
        .filter-box input, .filter-box select { flex: 1; min-width: 130px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;}
        .card{background:#fff; padding:15px; margin-bottom:12px; border-radius:8px; border-left:6px solid var(--primary); box-shadow:0 2px 5px rgba(0,0,0,0.05);}
        .sub-card { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; margin-top: 5px; border-radius: 5px; font-size: 13px; }
        .date-info { font-size: 10px; color: #7f8c8d; margin-top: 8px; border-top: 1px solid #f0f0f0; padding-top: 5px; display: block; }
        input, select, textarea { width:100%; padding:12px; margin:5px 0 12px 0; border:1px solid #ccc; border-radius:5px; box-sizing: border-box; }
        .btn-main{ background: var(--success); color:white; border:none; padding:15px; width:100%; border-radius:5px; cursor:pointer; font-weight:bold; }
        .btn-group { display: flex; gap: 4px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 11px; font-weight: bold;}
        .btn-edit { background: var(--warning); color: black !important; }
        .btn-del { background: var(--danger); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .status-pend { background: var(--warning); color: black; }
        .status-aprov { background: var(--success); }
        .status-alt { background: var(--info); }
        .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); }
        .modal-content { background:white; margin:5% auto; padding:20px; width:90%; max-width:600px; border-radius:10px; max-height: 85vh; overflow-y: auto; }
        #toast { display:none; position:fixed; top:20px; right:20px; background:var(--success); color:white; padding:12px 20px; border-radius:8px; z-index:2000; font-weight:bold; }
    </style>
</head>
<body onload="syncCloud()">

<div id="toast">Operação concluída! ✅</div>
<header>ROFREICRC v12.0 - GESTÃO DE HORAS</header>

<div class="container">
    <div id="login" class="sec" style="display:block">
        <h2>Acesso à Cloud</h2>
        <input id="user" placeholder="Utilizador">
        <input id="pass" type="password" placeholder="Palavra-passe">
        <button class="btn-main" onclick="login()">ENTRAR</button>
    </div>

    <div id="app" style="display:none">
        <div class="menu">
            <button onclick="show('obras')">🏗️</button>
            <button onclick="show('hrs')">🕒</button>
            <button onclick="show('obs')">📝</button>
            <button onclick="show('ped')">🛒</button>
            <button onclick="show('tar')">✅</button>
            <button onclick="show('notif_center')" style="background:var(--secondary); position:relative;">
                🔔 <span id="notif-count" style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:10px; position:absolute; top:2px; right:2px; display:none;">0</span>
            </button>
            <button id="menu-admin" onclick="show('users_admin')" style="display:none; background:var(--dark)">👥</button>
            <button onclick="logout()" style="background:var(--danger)">✖</button>
        </div>

        <div id="hrs" class="sec">
            <h2 id="title-hrs">🕒 Registo de Horas</h2>
            
            <div id="form-horas">
                <label>Data do Trabalho:</label>
                <input type="date" id="hrs_data">
                <select id="hrs_obra"></select>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Início:</label><input type="time" id="hrs_inicio"></div>
                    <div style="flex:1"><label>Fim:</label><input type="time" id="hrs_fim"></div>
                </div>
                <textarea id="hrs_tarefas" placeholder="Tarefas realizadas nesta obra..."></textarea>
                
                <div id="admin-status-area" style="display:none; background:#f0f2f5; padding:10px; border-radius:5px; margin-bottom:10px;">
                    <label><b>Estado (Admin):</b></label>
                    <select id="hrs_estado_admin">
                        <option>Por aprobar</option>
                        <option>Aprovado</option>
                        <option>Solicita alteração</option>
                        <option>Sem efeito</option>
                    </select>
                </div>
                
                <button class="btn-main" onclick="guardarHoras()">Gravar Registo</button>
            </div>

            <div class="filter-box">
                <input type="date" id="f_hrs_dia" oninput="renderAll()">
                <input id="f_hrs_num" placeholder="Nº Obra..." oninput="renderAll()">
                <input id="f_hrs_nom" placeholder="Nome Obra..." oninput="renderAll()">
                <input id="f_hrs_user" placeholder="Utilizador..." oninput="renderAll()">
                <select id="f_hrs_est" onchange="renderAll()">
                    <option value="">Estado (Todos)</option>
                    <option>Por aprobar</option>
                    <option>Aprovado</option>
                    <option>Solicita alteração</option>
                    <option>Sem efeito</option>
                </select>
            </div>
            <div id="lista_horas"></div>
        </div>

        <div id="obras" class="sec">
            <h2 id="title-obras">🏗️ Obras</h2>
            <div id="form-obra-admin" style="display:none">
                <input id="obra_num" placeholder="Nº Obra">
                <input id="obra_nome" placeholder="Nome da Obra">
                <select id="f_o_est_input"><option>Em execução</option><option>Finalizada</option><option>Sem efeito</option></select>
                <button class="btn-main" onclick="guardarRegistro('obras')">Gravar Obra</button>
            </div>
            <div class="filter-box"><input id="f_o_num" placeholder="Nº..." oninput="renderAll()"><input id="f_o_nom" placeholder="Nome..." oninput="renderAll()"></div>
            <div id="lista_obras"></div>
        </div>

        <div id="obs" class="sec"><h2>📝 Observações</h2><select id="obs_obra"></select><textarea id="obs_desc"></textarea><select id="obs_estado"><option>Por Resolver</option><option>Resolvido</option><option>Sem efeito</option></select><button class="btn-main" onclick="guardarRegistro('obs')">Gravar</button><div id="lista_obs"></div></div>
        
        <div id="ped" class="sec">
            <h2>🛒 Pedidos</h2>
            <select id="ped_obra"></select><input id="ped_mat" placeholder="Material"><input id="ped_qtd" placeholder="Qtd"><input id="ped_enc" placeholder="Nota Enc."><input id="ped_guia" placeholder="Guia (Obrigatorio se Entregue)">
            <select id="ped_estado"><option>Solicitado</option><option>Aprovado</option><option>Entregue</option><option>Sem efeito</option></select>
            <button class="btn-main" onclick="guardarRegistro('ped')">Gravar</button>
            <div id="lista_ped"></div>
        </div>

        <div id="tar" class="sec"><h2>✅ Tarefas</h2><select id="tar_obra"></select><input id="tar_tit"><select id="tar_para" multiple></select><select id="tar_estado"><option>Por Executar</option><option>Executada</option><option>Sem efeito</option></select><button class="btn-main" onclick="guardarRegistro('tar')">Gravar</button><div id="lista_tar"></div></div>

        <div id="users_admin" class="sec"><h2>👥 Utilizadores</h2><input id="u_name"><input id="u_pass"><select id="u_role"><option>Operacional</option><option>Administrador</option></select><button class="btn-main" onclick="guardarUsuario()">Gravar</button><div id="lista_users"></div></div>

        <div id="notif_center" class="sec"><h2>🔔 Notificações</h2><div id="lista_notificaciones"></div></div>
    </div>
</div>

<div id="modal-notas" class="modal"><div class="modal-content"><h3>💬 Notas</h3><div id="lista-notas-content"></div><textarea id="nota-texto"></textarea><button class="btn-main" onclick="addNota()">Add</button><button onclick="closeModals()">Fechar</button></div></div>
<div id="modal-hist" class="modal"><div class="modal-content"><h3>📜 Histórico</h3><div id="lista-hist-content"></div><button onclick="closeModals()">Fechar</button></div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBkWCoWX0oN1HWCA6aGt_kdg_2vyFz1mM",
  authDomain: "rofreicrc-175f9.firebaseapp.com",
  databaseURL: "https://rofreicrc-175f9-default-rtdb.firebaseio.com",
  projectId: "rofreicrc-175f9",
  storageBucket: "rofreicrc-175f9.firebasestorage.app",
  messagingSenderId: "597226985528",
  appId: "1:597226985528:web:c371ca51032301e51feecd"
};

firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();

let db = { obras: [], obs: [], ped: [], tar: [], users: [], horas: [], notifications: [], notas: {}, historial: {} };
let currentUser = null, editId = null, currentRef = null, editSubId = null;

function syncCloud() {
    rtdb.ref('/').on('value', (snap) => {
        const d = snap.val() || {};
        db.obras = d.obras ? Object.values(d.obras) : [];
        db.obs = d.obs ? Object.values(d.obs) : [];
        db.ped = d.ped ? Object.values(d.ped) : [];
        db.tar = d.tar ? Object.values(d.tar) : [];
        db.users = d.users ? Object.values(d.users) : [];
        db.horas = d.horas ? Object.values(d.horas) : [];
        db.notifications = d.notifications ? Object.entries(d.notifications).map(([id,v])=>({id,...v})).reverse() : [];
        db.notas = d.notas || {};
        db.historial = d.historial || {};
        renderAll();
        updateSelects();
    });
}

function login() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();
    if(u === "admin" && p === "23778478") { currentUser = {u: "admin", role: "Administrador", status: "Ativo"}; }
    else { currentUser = db.users.find(x => x.u === u && x.p === p); }
    if(currentUser && currentUser.status === "Ativo") {
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        if(currentUser.role === "Administrador") { 
            document.getElementById("form-obra-admin").style.display="block"; 
            document.getElementById("menu-admin").style.display="block";
            document.getElementById("admin-status-area").style.display="block";
        }
    } else { alert("Acesso Negado."); }
}

// --- LÓGICA DE HORAS (MÓDULO + SUBMÓDULO) ---

function diffHoras(ini, fim) {
    if(!ini || !fim) return 0;
    const s = ini.split(':'), e = fim.split(':');
    const start = parseInt(s[0])*60 + parseInt(s[1]);
    const end = parseInt(e[0])*60 + parseInt(e[1]);
    return (end - start) / 60;
}

function guardarHoras() {
    const data = document.getElementById("hrs_data").value;
    const obraId = document.getElementById("hrs_obra").value;
    const ini = document.getElementById("hrs_inicio").value;
    const fim = document.getElementById("hrs_fim").value;
    const tareas = document.getElementById("hrs_tarefas").value;
    
    if(!data || !obraId || !ini || !fim) return alert("Preencha todos os campos!");
    
    const obra = db.obras.find(o => o.id === obraId);
    // ID Único por Usuario y Día para agrupar
    const registroId = editId || `${currentUser.u}_${data.replace(/-/g,'')}`;
    const entry = db.horas.find(h => h.id === registroId) || { 
        id: registroId, 
        user: currentUser.u, 
        data: data, 
        estado: "Por aprobar", 
        intervenciones: [],
        createdAt: new Date().toLocaleString()
    };

    // Si el registro está aprobado y NO es admin, bloquear
    if(entry.estado === "Aprovado" && currentUser.role !== 'Administrador') {
        return alert("Este registo já foi aprovado e não pode ser alterado.");
    }

    const nuevaIntervencion = {
        subId: editSubId || Date.now().toString(),
        obraId: obra.id,
        obraNum: obra.num,
        obraNome: obra.nome,
        inicio: ini,
        fim: fim,
        tareas: tareas,
        horas: diffHoras(ini, fim)
    };

    if(editSubId) {
        const idx = entry.intervenciones.findIndex(i => i.subId === editSubId);
        entry.intervenciones[idx] = nuevaIntervencion;
    } else {
        entry.intervenciones.push(nuevaIntervencion);
    }

    if(currentUser.role === 'Administrador') {
        entry.estado = document.getElementById("hrs_estado_admin").value;
    }

    entry.updatedAt = new Date().toLocaleString();

    rtdb.ref(`horas/${registroId}`).set(entry).then(() => {
        rtdb.ref(`historial/${registroId}`).push({ quem: currentUser.u, quando: entry.updatedAt, info: `Registo de horas atualizado (${data})` });
        cancelarEdicaoHoras();
        showToast();
    });
}

function prepararEdicionSub(id, subId) {
    editId = id; editSubId = subId;
    const entry = db.horas.find(h => h.id === id);
    const sub = entry.intervenciones.find(s => s.subId === subId);
    
    document.getElementById("hrs_data").value = entry.data;
    document.getElementById("hrs_obra").value = sub.obraId;
    document.getElementById("hrs_inicio").value = sub.inicio;
    document.getElementById("hrs_fim").value = sub.fim;
    document.getElementById("hrs_tarefas").value = sub.tareas;
    if(currentUser.role === 'Administrador') document.getElementById("hrs_estado_admin").value = entry.estado;
    document.getElementById("title-hrs").innerText = "✏️ Editando Intervenção...";
}

function eliminarSub(id, subId) {
    const entry = db.horas.find(h => h.id === id);
    if(entry.estado === "Aprovado" && currentUser.role !== 'Administrador') return alert("Bloqueado: Registo Aprovado");
    
    if(confirm("Eliminar esta intervenção?")) {
        entry.intervenciones = entry.intervenciones.filter(s => s.subId !== subId);
        if(entry.intervenciones.length === 0) {
            rtdb.ref(`horas/${id}`).remove();
        } else {
            rtdb.ref(`horas/${id}`).set(entry);
        }
    }
}

function cancelarEdicaoHoras() {
    editId = null; editSubId = null;
    document.querySelectorAll('#hrs input, #hrs textarea').forEach(i => i.value = "");
    document.getElementById("title-hrs").innerText = "🕒 Registo de Horas";
}

function renderAll() {
    // --- RENDER HORAS ---
    const fDia = document.getElementById("f_hrs_dia").value;
    const fNum = document.getElementById("f_hrs_num").value.toLowerCase();
    const fNom = document.getElementById("f_hrs_nom").value.toLowerCase();
    const fUser = document.getElementById("f_hrs_user").value.toLowerCase();
    const fEst = document.getElementById("f_hrs_est").value;

    let hList = db.horas.filter(h => {
        const matchUser = currentUser.role === 'Administrador' ? h.user.toLowerCase().includes(fUser) : h.user === currentUser.u;
        const matchDia = !fDia || h.data === fDia;
        const matchEst = !fEst || h.estado === fEst;
        // Filtro por obra dentro de las intervenciones
        const matchObra = h.intervenciones.some(i => i.obraNum.toLowerCase().includes(fNum) && i.obraNome.toLowerCase().includes(fNom));
        return matchUser && matchDia && matchEst && matchObra;
    });

    // Ordenar por fecha (más nueva primero)
    hList.sort((a,b) => new Date(b.data) - new Date(a.data));

    document.getElementById("lista_horas").innerHTML = hList.map(h => {
        const totalDia = h.intervenciones.reduce((acc, curr) => acc + curr.horas, 0);
        const canEdit = currentUser.role === 'Administrador' || h.estado !== 'Aprovado';
        
        return `
            <div class="card" style="border-left-color: ${h.estado === 'Aprovado' ? 'var(--success)' : 'var(--warning)'}">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <b>📅 ${h.data}</b> - <small>${h.user}</small>
                        <br><span class="badge ${h.estado==='Aprovado'?'status-aprov':h.estado==='Por aprobar'?'status-pend':'status-alt'}">${h.estado}</span>
                    </div>
                    <div style="text-align:right">
                        <span style="font-size:18px; font-weight:bold; color:var(--primary)">${totalDia.toFixed(2)}h</span>
                    </div>
                </div>
                
                <div class="sub-modulo">
                    ${h.intervenciones.map(i => `
                        <div class="sub-card">
                            <b>Obra ${i.obraNum}</b> (${i.inicio} - ${i.fim}) | <b>${i.horas.toFixed(2)}h</b>
                            <br><i>${i.tareas}</i>
                            ${canEdit ? `
                                <div class="btn-group" style="margin-top:5px">
                                    <button class="btn-edit" onclick="prepararEdicaoSub('${h.id}','${i.subId}')">✏️</button>
                                    <button class="btn-del" onclick="eliminarSub('${h.id}','${i.subId}')">❌</button>
                                </div>
                            ` : ''}
                        </div>
                    `).join("")}
                </div>

                <div class="btn-group">
                    <button class="btn-note" onclick="openNotas('${h.id}')" style="background:var(--secondary)">💬 Notas</button>
                    <button class="btn-hist" onclick="openHistorial('${h.id}')" style="background:var(--info)">📜 Hist.</button>
                    ${currentUser.role === 'Administrador' ? `<button class="btn-del" onclick="eliminar('horas','${h.id}')">❌ Apagar Dia</button>` : ''}
                </div>
            </div>
        `;
    }).join("") || "<p style='text-align:center; color:#999'>Nenhum registo encontrado.</p>";

    // --- RE-RENDER OTROS MODULOS --- (Manteniendo la estructura de filtros de la v11.4)
    renderModulo('obras', 'lista_obras', o => `<b>${o.num} - ${o.nome}</b><br><small>${o.estado}</small>`, o => o.num.includes(document.getElementById("f_o_num").value));
    renderModulo('obs', 'lista_obs', o => `<b>Obra ${o.obraNum}</b>: ${o.desc}<br><small>${o.estado}</small>`, o => true);
    renderModulo('ped', 'lista_ped', o => `<b>Obra ${o.obraNum}</b>: ${o.mat} (${o.qtd})<br><small>Guia: ${o.guia || '---'} | ${o.estado}</small>`, o => true);
}

// --- FUNCIONES CORE ---

function renderModulo(mod, target, template, filterFn) {
    const list = db[mod].filter(filterFn);
    document.getElementById(target).innerHTML = list.reverse().map(i => `
        <div class="card">${template(i)}
            <div class="btn-group">
                <button class="btn-note" onclick="openNotas('${i.id}')">💬</button>
                <button class="btn-hist" onclick="openHistorial('${i.id}')">📜</button>
                ${currentUser.role==='Administrador' ? `<button class="btn-edit" onclick="prepararEdicao('${mod}','${i.id}')">✏️</button><button class="btn-del" onclick="eliminar('${mod}','${i.id}')">❌</button>` : ''}
            </div>
        </div>`).join("");
}

function updateSelects() {
    const activeObras = db.obras.filter(o => o.estado === 'Em execução');
    const opt = '<option value="">Selecionar Obra...</option>' + activeObras.map(o => `<option value="${o.id}">${o.num} - ${o.nome}</option>`).join("");
    ['obs_obra','ped_obra','tar_obra','hrs_obra'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = opt; });
    if(document.getElementById('tar_para')) document.getElementById('tar_para').innerHTML = db.users.map(u=>`<option value="${u.u}">${u.u}</option>`).join("");
}

function show(id) { document.querySelectorAll(".sec").forEach(s=>s.style.display="none"); document.getElementById(id).style.display="block"; }
function closeModals() { document.querySelectorAll(".modal").forEach(m=>m.style.display="none"); }
function showToast() { const t = document.getElementById("toast"); t.style.display="block"; setTimeout(()=>t.style.display="none", 2000); }
function logout() { location.reload(); }
function openHistorial(id) { document.getElementById("modal-hist").style.display="block"; const h = Object.values(db.historial[id] || {}); document.getElementById("lista-hist-content").innerHTML = h.reverse().map(x => `<div style="font-size:12px"><b>${x.quando}</b>: ${x.info} (${x.quem})</div>`).join(""); }
function openNotas(id) { currentRef = id; document.getElementById("modal-notas").style.display="block"; renderNotas(); }
function renderNotas() { const n = Object.values(db.notas[currentRef] || {}); document.getElementById("lista-notas-content").innerHTML = n.map(x => `<div style="font-size:12px"><b>${x.u}:</b> ${x.t}</div>`).join(""); }
function addNota() { const t = document.getElementById("nota-texto").value.trim(); if(!t) return; rtdb.ref(`notas/${currentRef}`).push({ u: currentUser.u, t, d: new Date().toLocaleString() }).then(()=>document.getElementById("nota-texto").value=""); }
function eliminar(path, id) { if(confirm("Apagar definitivamente?")) rtdb.ref(`${path}/${id}`).remove(); }

</script>
</body>
</html>
