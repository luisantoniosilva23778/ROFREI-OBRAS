<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>ROFREICRC v18.0 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --p: #0f172a; --s: #334155; --acc: #2563eb; --ok: #16a34a; --err: #dc2626; --warn: #ea580c; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); font-size: 12px; color: #1e293b; }
        header { background: var(--p); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 200; }
        nav { display: flex; flex-wrap: wrap; background: #e2e8f0; padding: 5px; gap: 5px; position: sticky; top: 49px; z-index: 100; }
        nav button { flex: 1; min-width: 90px; padding: 10px; border: none; background: var(--s); color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        nav button.active { background: var(--acc); }
        .container { padding: 15px; max-width: 1400px; margin: auto; }
        .mod-sec { display: none; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-box { border: 1px solid #e2e8f0; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .full-w { grid-column: 1 / -1; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        .btn-main { background: var(--ok); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-cancel { background: var(--s); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; margin-top: 5px; display: none; width: 100%; }
        .card { border: 1px solid #e2e8f0; border-left: 5px solid var(--acc); padding: 15px; margin: 10px 0; border-radius: 4px; background: white; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .actions { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .actions button { padding: 6px 10px; border: none; border-radius: 3px; cursor: pointer; color: white; font-size: 10px; font-weight: bold; }
        .b-edit { background: var(--acc); } .b-note { background: var(--warn); } .b-file { background: var(--ok); } .b-hist { background: var(--s); } .b-del { background: var(--err); }
        .filter-bar { background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .filter-item { flex: 1; min-width: 120px; }
        .modal { display:none; position:fixed; z-index:1000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); }
        .modal-content { background:white; width:90%; max-width:800px; margin: 5% auto; padding: 20px; border-radius: 8px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>
<header>ROFREICRC v18.0 - GESTÃO OPERACIONAL</header>
<div id="login-sec" style="max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="text-align:center">Login</h2>
    <input type="text" id="log-u" placeholder="Utilizador" style="margin-bottom:10px">
    <input type="password" id="log-p" placeholder="Senha" style="margin-bottom:20px">
    <button class="btn-main" onclick="doLogin()">ENTRAR</button>
</div>
<div id="app" style="display:none">
    <nav id="navbar"></nav>
    <div class="container">
        <section id="mod-obras" class="mod-sec">
            <div class="form-box">
                <h3>🏗️ Obras</h3>
                <div class="grid">
                    <input type="text" id="o-num" placeholder="Nº Obra">
                    <input type="text" id="o-nom" placeholder="Nome">
                    <select id="o-est"><option>Em Execução</option><option>Finalizada</option></select>
                </div>
                <button class="btn-main" onclick="saveRecord('obras')">Gravar</button>
                <button id="o-cancel" class="btn-cancel" onclick="cancelarEdit('obras')">Cancelar</button>
            </div>
            <div class="filter-bar">
                <input type="text" id="filt-o-num" placeholder="Filtrar Nº" oninput="renderObras()">
                <input type="text" id="filt-o-nom" placeholder="Filtrar Nome" oninput="renderObras()">
            </div>
            <div id="list-obras"></div>
        </section>
        <section id="mod-horas" class="mod-sec">
            <div class="form-box">
                <h3>🕒 Horas</h3>
                <div class="grid">
                    <input type="date" id="h-dat">
                    <select id="h-obr"></select>
                    <input type="time" id="h-ini">
                    <input type="time" id="h-fim">
                    <textarea id="h-task" class="full-w" placeholder="Tarefa"></textarea>
                    <select id="h-est" disabled><option>Por Aprobar</option><option>Aprobada</option></select>
                </div>
                <button class="btn-main" onclick="saveRecord('horas')">Gravar</button>
                <button id="h-cancel" class="btn-cancel" onclick="cancelarEdit('horas')">Cancelar</button>
            </div>
            <div class="filter-bar">
                <select id="filt-h-mes" onchange="renderHoras()"><option value="">Mês</option><option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option><option value="04">Abr</option><option value="05">Mai</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option><option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option></select>
                <select id="filt-h-ano" onchange="renderHoras()"><option value="">Ano</option><option>2024</option><option>2025</option></select>
                <select id="filt-h-est" onchange="renderHoras()"><option value="">Estado</option><option>Por Aprobar</option><option>Aprobada</option></select>
            </div>
            <div id="list-horas"></div>
        </section>
        <section id="mod-ne" class="mod-sec">
            <div class="form-box">
                <h3>📄 Nota Encomenda</h3>
                <div class="grid">
                    <input type="text" id="ne-num" readonly style="background:#eee">
                    <select id="ne-obr"></select>
                    <input type="text" id="ne-prov" placeholder="Fornecedor">
                    <select id="ne-est"><option>Emitida</option><option>Finalizada</option></select>
                </div>
                <table style="width:100%; margin-top:10px" border="1" id="ne-table">
                    <thead><tr><th>Qtd</th><th>Un</th><th>Mat</th><th>Preço</th><th>Total</th><th></th></tr></thead>
                    <tbody id="ne-body"></tbody>
                </table>
                <button onclick="addNERow()" style="margin:10px 0">+ Item</button>
                <button class="btn-main" onclick="saveNE()">Gerar NE e PDF</button>
                <button id="ne-cancel" class="btn-cancel" onclick="cancelarEdit('ne')">Limpar</button>
            </div>
            <div class="filter-bar"><input type="text" id="filt-ne-num" placeholder="Procurar Nº" oninput="renderNE()"></div>
            <div id="list-ne"></div>
        </section>
        <section id="mod-ped" class="mod-sec">
            <h3>🛒 Pedidos de Material</h3>
            <div class="filter-bar"><select id="filt-ped-est" onchange="renderPed()"><option value="">Todos</option><option>Por Solicitar</option><option>Encomendado</option><option>Entregue pelo Fornecedor</option></select></div>
            <div id="list-ped"></div>
        </section>
    </div>
</div>
<div id="modal-files" class="modal"><div class="modal-content"><h3>Ficheiros</h3><input type="file" id="file-input" multiple onchange="handleFileUpload()"><div id="file-list" style="margin:15px 0"></div><button class="btn-main" onclick="downloadCurrentFiles()">Download ZIP</button><button onclick="closeModal('modal-files')">Fechar</button></div></div>
<div id="modal-hist" class="modal"><div class="modal-content"><h3>Historial</h3><div id="hist-body"></div><button onclick="closeModal('modal-hist')">Fechar</button></div></div>
<div id="modal-notas" class="modal"><div class="modal-content"><h3>Notas</h3><textarea id="nota-texto" style="width:100%; height:200px"></textarea><button class="btn-main" onclick="saveNota()">Gravar Nota</button><button onclick="closeModal('modal-notas')">Fechar</button></div></div>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyCBkWCoWX0oN1HWCA6aGt_kdg_2vyFz1mM",
    authDomain: "rofreicrc-175f9.firebaseapp.com",
    databaseURL: "https://rofreicrc-175f9-default-rtdb.firebaseio.com",
    projectId: "rofreicrc-175f9",
    appId: "1:597226985528:web:c371ca51032301e51feecd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let DB = { obras:[], horas:[], ne:[], ped:[], tar:[], obs:[], users:[], notif:[], hist:{} };
let user = null; let editingId = null; let activeFileId = null; let activeNotaId = null;

function doLogin() {
    const u = document.getElementById('log-u').value;
    const p = document.getElementById('log-p').value;
    if(u === 'admin' && p === '23778478') user = { u: 'admin', role: 'Administrador' };
    else user = DB.users.find(x => x.u === u && x.p === p && x.st === 'Ativo');
    if(user) {
        document.getElementById('login-sec').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initNav(); sync();
    } else alert("Acesso Negado");
}

function initNav() {
    const mods = ['obras','horas','ne','ped'];
    document.getElementById('navbar').innerHTML = mods.map(m => `<button id="nav-${m}" onclick="showMod('${m}')">${m.toUpperCase()}</button>`).join('');
}

function sync() {
    db.ref('/').on('value', snap => {
        const val = snap.val() || {};
        ['obras','horas','ne','ped','tar','obs','users','notif'].forEach(m => DB[m] = val[m] ? Object.values(val[m]) : []);
        DB.hist = val.hist || {};
        updateSelects(); renderAll();
    });
}

function showMod(m) {
    document.querySelectorAll('.mod-sec').forEach(s => s.style.display='none');
    document.getElementById(`mod-${m}`).style.display='block';
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(`nav-${m}`).classList.add('active');
    cancelarEdit(m);
}

async function saveRecord(mod) {
    const id = editingId || `ID_${Date.now()}`;
    const isNew = !editingId;
    let data = { id, u_edit: user.u, d_edit: new Date().toLocaleString() };
    if(isNew) { data.u_crea = user.u; data.d_crea = data.d_edit; }

    if(mod==='obras'){ data.num=document.getElementById('o-num').value; data.nom=document.getElementById('o-nom').value; data.est=document.getElementById('o-est').value; }
    if(mod==='horas'){
        const s = document.getElementById('h-obr');
        data.dat=document.getElementById('h-dat').value; data.obrId=s.value; data.obrNom=s.options[s.selectedIndex].text;
        data.ini=document.getElementById('h-ini').value; data.fim=document.getElementById('h-fim').value; data.task=document.getElementById('h-task').value;
        data.est = isNew ? 'Por Aprobar' : document.getElementById('h-est').value;
    }
    await db.ref(`${mod}/${id}`).update(data);
    await db.ref(`hist/${id}`).push({ u:user.u, ts:data.d_edit, log:'Alteração' });
    cancelarEdit(mod);
}

let neRowIdx = 0;
function addNERow(v={q:'',u:'',p:'',pr:''}) {
    const b = document.getElementById('ne-body');
    const tr = document.createElement('tr'); const rid = `ner_${neRowIdx++}`; tr.id = rid;
    tr.innerHTML = `<td><input type="number" class="nq" value="${v.q}"></td><td><input type="text" class="nu" value="${v.u}"></td><td><input type="text" class="np" value="${v.p}"></td><td><input type="number" class="npr" value="${v.pr}"></td><td class="nt">0</td><td><button onclick="this.parentElement.parentElement.remove()">X</button></td>`;
    b.appendChild(tr);
}

async function saveNE() {
    const id = `NE_${Date.now()}`; const num = document.getElementById('ne-num').value; const obr = document.getElementById('ne-obr');
    const items = Array.from(document.querySelectorAll('#ne-body tr')).map(tr => ({ q:tr.querySelector('.nq').value, u:tr.querySelector('.nu').value, p:tr.querySelector('.np').value, pr:tr.querySelector('.npr').value }));
    const data = { id, num, prov:document.getElementById('ne-prov').value, obrNom:obr.options[obr.selectedIndex].text, items, d_edit:new Date().toLocaleString() };
    
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    doc.text(`Encomenda ${num} - ${data.obrNom}`, 10, 10);
    doc.autoTable({ head:[['Qtd','Mat','Preço']], body: items.map(i=>[i.q, i.p, i.pr]) });
    data.files = [{ n:`NE_${num}.pdf`, d: doc.output('datauristring') }];
    
    await db.ref(`ne/${id}`).set(data);
    for(let i of items){
        const pid = `P_${Date.now()}_${Math.random()}`;
        await db.ref(`ped/${pid}`).set({ id:pid, mat:i.p, qtd:i.q, obrNom:data.obrNom, est:'Por Solicitar' });
    }
    alert("NE e Pedidos Sincronizados"); cancelarEdit('ne');
}

function renderAll() { renderObras(); renderHoras(); renderNE(); renderPed(); }

function renderObras() {
    const fNum = document.getElementById('filt-o-num').value.toLowerCase();
    const fNom = document.getElementById('filt-o-nom').value.toLowerCase();
    const filtered = DB.obras.filter(o => o.num.toLowerCase().includes(fNum) && o.nom.toLowerCase().includes(fNom));
    document.getElementById('list-obras').innerHTML = filtered.map(o => `
        <div class="card">
            <div class="card-grid"><div><b>Nº:</b> ${o.num}</div><div><b>Nome:</b> ${o.nom}</div><div><b>Estado:</b> ${o.est}</div></div>
            ${getActions('obras', o)}
        </div>`).join('');
}

function renderHoras() {
    const fMes = document.getElementById('filt-h-mes').value;
    const fAno = document.getElementById('filt-h-ano').value;
    const fEst = document.getElementById('filt-h-est').value;
    const filtered = DB.horas.filter(h => {
        const d = h.dat.split('-');
        return (fMes==='' || d[1]===fMes) && (fAno==='' || d[0]===fAno) && (fEst==='' || h.est===fEst);
    });
    document.getElementById('list-horas').innerHTML = filtered.map(h => `
        <div class="card">
            <div class="card-grid"><div><b>Data:</b> ${h.dat}</div><div><b>Obra:</b> ${h.obrNom}</div><div><b>Estado:</b> ${h.est}</div><div class="full-w">${h.task}</div></div>
            ${getActions('horas', h)}
        </div>`).join('');
}

function renderPed() {
    const fEst = document.getElementById('filt-ped-est').value;
    const filtered = DB.ped.filter(p => fEst==='' || p.est===fEst);
    document.getElementById('list-ped').innerHTML = filtered.map(p => `
        <div class="card">
            <div class="card-grid"><div><b>Obra:</b> ${p.obrNom}</div><div><b>Material:</b> ${p.mat}</div><div><b>Qtd:</b> ${p.qtd}</div><div><b>Est:</b> ${p.est}</div></div>
            ${getActions('ped', p)}
        </div>`).join('');
}

function renderNE() {
    const fNum = document.getElementById('filt-ne-num').value.toLowerCase();
    const filtered = DB.ne.filter(n => n.num.toLowerCase().includes(fNum));
    document.getElementById('list-ne').innerHTML = filtered.map(n => `
        <div class="card">
            <div class="card-grid"><div><b>NE Nº:</b> ${n.num}</div><div><b>Obra:</b> ${n.obrNom}</div><div><b>Fornecedor:</b> ${n.prov}</div></div>
            ${getActions('ne', n)}
        </div>`).join('');
}

function getActions(mod, item) {
    return `<div class="actions">
        <button class="b-edit" onclick="prepEdit('${mod}','${item.id}')">✏️</button>
        <button class="b-note" onclick="openNota('${mod}','${item.id}')">📝</button>
        <button class="b-file" onclick="openFiles('${mod}','${item.id}')">📁 (${item.files?item.files.length:0})</button>
        <button class="b-hist" onclick="openHist('${item.id}')">📜</button>
        <button class="b-del" onclick="deleteRecord('${mod}','${item.id}')">🗑️</button>
    </div>`;
}

function prepEdit(mod, id) {
    editingId = id; const item = DB[mod].find(x => x.id === id); const pre = {obras:'o',horas:'h',ne:'ne',ped:'p'}[mod];
    document.getElementById(`${pre}-cancel`).style.display = 'block';
    if(mod==='obras'){ document.getElementById('o-num').value=item.num; document.getElementById('o-nom').value=item.nom; document.getElementById('o-est').value=item.est; }
    if(mod==='horas'){ document.getElementById('h-dat').value=item.dat; document.getElementById('h-obr').value=item.obrId; document.getElementById('h-task').value=item.task; document.getElementById('h-est').disabled=false; document.getElementById('h-est').value=item.est; }
    window.scrollTo(0,0);
}

function cancelarEdit(mod) {
    editingId = null; const pre = {obras:'o',horas:'h',ne:'ne',ped:'p'}[mod];
    if(document.getElementById(`${pre}-cancel`)) document.getElementById(`${pre}-cancel`).style.display = 'none';
    if(mod==='ne'){ document.getElementById('ne-body').innerHTML=''; autoNumNE(); addNERow(); }
    if(mod==='horas') document.getElementById('h-est').disabled=true;
}

function updateSelects() {
    const opt = DB.obras.filter(o=>o.est==='Em Execução').map(o=>`<option value="${o.id}">${o.num}-${o.nom}</option>`).join('');
    ['h-obr','ne-obr'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = opt; });
}

function autoNumNE() {
    const last = DB.ne.length ? Math.max(...DB.ne.map(n=>parseInt(n.num)||1000)) : 1000;
    document.getElementById('ne-num').value = last + 1;
}

// SOPORTE MODALES
function openFiles(mod, id) { activeFileId={mod,id}; document.getElementById('modal-files').style.display='block'; refreshFiles(); }
function refreshFiles() {
    const item = DB[activeFileId.mod].find(x=>x.id===activeFileId.id);
    document.getElementById('file-list').innerHTML = (item.files||[]).map(f => `<div>📄 ${f.n}</div>`).join('');
}
async function handleFileUpload() {
    const files = document.getElementById('file-input').files; const item = DB[activeFileId.mod].find(x=>x.id===activeFileId.id);
    for(let f of files){
        const r = new FileReader(); r.onload = async (e) => {
            const up = [...(item.files||[]), { n:f.name, d:e.target.result }];
            await db.ref(`${activeFileId.mod}/${activeFileId.id}/files`).set(up); refreshFiles();
        }; r.readAsDataURL(f);
    }
}
function openHist(id) {
    const h = DB.hist[id] || {};
    document.getElementById('hist-body').innerHTML = Object.values(h).map(x=>`<div>${x.ts}: ${x.log}</div>`).join('') || 'Vazio';
    document.getElementById('modal-hist').style.display='block';
}
function openNota(mod, id) { activeNotaId={mod,id}; document.getElementById('nota-texto').value = DB[mod].find(x=>x.id===id).notas || ''; document.getElementById('modal-notas').style.display='block'; }
async function saveNota() { await db.ref(`${activeNotaId.mod}/${activeNotaId.id}/notas`).set(document.getElementById('nota-texto').value); closeModal('modal-notas'); }
function closeModal(m) { document.getElementById(m).style.display='none'; }
async function deleteRecord(m, id) { if(confirm("Apagar?")) await db.ref(`${m}/${id}`).remove(); }
</script>
</body>
</html>
