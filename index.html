<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>ROFREICRC v12.4 - MASTER SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1e3a5f; --secondary: #2c5282; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --light: #f8f9fa; --dark: #343a40; --info: #17a2b8; }
        body{font-family:'Segoe UI', sans-serif; margin:0; background:#f0f2f5; color:#333;}
        header{background: var(--primary); color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold;}
        .container{padding:15px; max-width: 1100px; margin: auto;}
        .menu{margin-bottom:20px; display:flex; flex-wrap:wrap; gap:5px;}
        .menu button{padding:12px; background: var(--primary); color:white; border:none; cursor:pointer; flex:1; border-radius:5px; font-weight: bold; min-width: 45px;}
        .sec{background:white; padding:20px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display:none;}
        .filter-box { background: #e9ecef; padding: 12px; border-radius: 8px; margin: 10px 0 15px 0; display: flex; flex-wrap: wrap; gap: 8px; border: 1px solid #dee2e6; }
        .filter-box input, .filter-box select { flex: 1; min-width: 120px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;}
        .card{background:#fff; padding:15px; margin-bottom:12px; border-radius:8px; border-left:6px solid var(--primary); box-shadow:0 2px 5px rgba(0,0,0,0.05);}
        .sub-card { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; margin-top: 5px; border-radius: 5px; font-size: 13px; }
        input, select, textarea { width:100%; padding:12px; margin:5px 0 12px 0; border:1px solid #ccc; border-radius:5px; box-sizing: border-box; }
        .btn-main{ background: var(--success); color:white; border:none; padding:15px; width:100%; border-radius:5px; cursor:pointer; font-weight:bold; }
        .btn-group { display: flex; gap: 4px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 11px; font-weight: bold;}
        .btn-edit { background: var(--warning); color: black !important; }
        .btn-del { background: var(--danger); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .status-void { background: #6c757d; } /* Color para Sem Efeito */
        #toast { display:none; position:fixed; top:20px; right:20px; background:var(--success); color:white; padding:12px 20px; border-radius:8px; z-index:2000; font-weight:bold; }
    </style>
</head>
<body onload="syncCloud()">

<div id="toast">Operação concluída! ✅</div>
<header>ROFREICRC v12.4 - GESTÃO TOTAL</header>

<div class="container">
    <div id="login" class="sec" style="display:block">
        <h2>Acesso</h2>
        <input id="user" placeholder="Utilizador">
        <input id="pass" type="password" placeholder="Palavra-passe">
        <button class="btn-main" onclick="login()">ENTRAR</button>
    </div>

    <div id="app" style="display:none">
        <div class="menu">
            <button onclick="show('obras')">🏗️</button>
            <button onclick="show('hrs')">🕒</button>
            <button onclick="show('obs')">📝</button>
            <button onclick="show('ped')">🛒</button>
            <button onclick="show('tar')">✅</button>
            <button onclick="show('notif')" style="background:var(--secondary)">🔔</button>
            <button id="menu-admin" onclick="show('users_admin')" style="display:none; background:var(--dark)">👥</button>
            <button onclick="logout()" style="background:var(--danger)">✖</button>
        </div>

        <div id="obras" class="sec">
            <h2>🏗️ Obras</h2>
            <div id="form-obra-admin" style="display:none">
                <input id="obra_num" placeholder="Nº Obra">
                <input id="obra_nome" placeholder="Nome da Obra">
                <select id="obra_estado"><option>Em execução</option><option>Finalizada</option><option>Sem efeito</option></select>
                <button class="btn-main" onclick="guardarRegistro('obras')">Gravar Obra</button>
            </div>
            <div class="filter-box">
                <input id="f_o_num" placeholder="Nº..." oninput="renderAll()">
                <input id="f_o_nom" placeholder="Nome..." oninput="renderAll()">
                <select id="f_o_est" onchange="renderAll()"><option value="">Estado (Todos)</option><option>Em execução</option><option>Finalizada</option><option>Sem efeito</option></select>
            </div>
            <div id="lista_obras"></div>
        </div>

        <div id="hrs" class="sec">
            <h2>🕒 Horas</h2>
            <div id="form-horas">
                <input type="date" id="hrs_data">
                <select id="hrs_obra"></select>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><input type="time" id="hrs_ini"></div>
                    <div style="flex:1"><input type="time" id="hrs_fim"></div>
                </div>
                <textarea id="hrs_txt" placeholder="Tarefas..."></textarea>
                <div id="admin-hrs-status" style="display:none; background:#eee; padding:10px; border-radius:5px; margin-bottom:10px;">
                    <select id="hrs_est_admin"><option>Por aprobar</option><option>Aprovado</option><option>Solicita alteração</option><option>Sem efeito</option></select>
                </div>
                <button class="btn-main" onclick="guardarHoras()">Adicionar</button>
            </div>
            <div class="filter-box">
                <select id="f_hrs_mes" onchange="renderAll()">
                    <option value="">Mês (Todos)</option>
                    <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                    <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                    <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                    <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
                <select id="f_hrs_ano" onchange="renderAll()"><option value="">Ano (Todos)</option></select>
                <input id="f_hrs_user" placeholder="User..." oninput="renderAll()">
                <select id="f_hrs_est" onchange="renderAll()"><option value="">Estado</option><option>Por aprobar</option><option>Aprovado</option><option>Solicita alteração</option><option>Sem efeito</option></select>
            </div>
            <div id="lista_horas"></div>
        </div>

        <div id="obs" class="sec">
            <h2>📝 Observações</h2>
            <select id="obs_obra"></select>
            <textarea id="obs_desc" placeholder="Detalhes..."></textarea>
            <select id="obs_est"><option>Por Resolver</option><option>Resolvido</option><option>Sem efeito</option></select>
            <button class="btn-main" onclick="guardarRegistro('obs')">Gravar</button>
            <div class="filter-box">
                <input id="f_obs_txt" placeholder="Pesquisar..." oninput="renderAll()">
                <select id="f_obs_est" onchange="renderAll()"><option value="">Estado</option><option>Por Resolver</option><option>Resolvido</option><option>Sem efeito</option></select>
            </div>
            <div id="lista_obs"></div>
        </div>

        <div id="ped" class="sec">
            <h2>🛒 Pedidos</h2>
            <select id="ped_obra"></select>
            <input id="ped_mat" placeholder="Material">
            <input id="ped_qtd" placeholder="Quantidade">
            <input id="ped_enc" placeholder="Nº Nota Encomenda">
            <input id="ped_guia" placeholder="Nº Guia">
            <select id="ped_est"><option>Solicitado</option><option>Aprovado</option><option>Entregue</option><option>Sem efeito</option></select>
            <button class="btn-main" onclick="guardarRegistro('ped')">Gravar</button>
            <div class="filter-box">
                <input id="f_ped_txt" placeholder="Material/Obra..." oninput="renderAll()">
                <select id="f_ped_est" onchange="renderAll()"><option value="">Estado</option><option>Solicitado</option><option>Aprovado</option><option>Entregue</option><option>Sem efeito</option></select>
            </div>
            <div id="lista_ped"></div>
        </div>

        <div id="tar" class="sec">
            <h2>✅ Tarefas</h2>
            <select id="tar_obra"></select>
            <input id="tar_tit" placeholder="Título">
            <select id="tar_para" multiple></select>
            <select id="tar_est"><option>Por Executar</option><option>Executada</option><option>Sem efeito</option></select>
            <button class="btn-main" onclick="guardarRegistro('tar')">Gravar</button>
            <div class="filter-box">
                <input id="f_tar_txt" placeholder="Tarefa..." oninput="renderAll()">
                <select id="f_tar_est" onchange="renderAll()"><option value="">Estado</option><option>Por Executar</option><option>Executada</option><option>Sem efeito</option></select>
            </div>
            <div id="lista_tar"></div>
        </div>

        <div id="notif" class="sec">
            <h2>🔔 Notificações</h2>
            <div id="lista_notif"></div>
        </div>

        <div id="users_admin" class="sec">
            <h2>👥 Utilizadores</h2>
            <input id="u_name" placeholder="User"><input id="u_pass" placeholder="Pass">
            <select id="u_role"><option>Operacional</option><option>Administrador</option></select>
            <button class="btn-main" onclick="guardarUsuario()">Criar</button>
            <div class="filter-box"><input id="f_u_txt" placeholder="Filtrar user..." oninput="renderAll()"></div>
            <div id="lista_users"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBkWCoWX0oN1HWCA6aGt_kdg_2vyFz1mM",
  authDomain: "rofreicrc-175f9.firebaseapp.com",
  databaseURL: "https://rofreicrc-175f9-default-rtdb.firebaseio.com",
  projectId: "rofreicrc-175f9",
  storageBucket: "rofreicrc-175f9.firebasestorage.app",
  messagingSenderId: "597226985528",
  appId: "1:597226985528:web:c371ca51032301e51feecd"
};
firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();

let db = { obras: [], obs: [], ped: [], tar: [], users: [], horas: [], notif: [] };
let currentUser = null, editId = null, editSubId = null;

function syncCloud() {
    rtdb.ref('/').on('value', (snap) => {
        const d = snap.val() || {};
        db.obras = d.obras ? Object.values(d.obras) : [];
        db.obs = d.obs ? Object.values(d.obs) : [];
        db.ped = d.ped ? Object.values(d.ped) : [];
        db.tar = d.tar ? Object.values(d.tar) : [];
        db.users = d.users ? Object.values(d.users) : [];
        db.horas = d.horas ? Object.values(d.horas) : [];
        db.notif = d.notif ? Object.values(d.notif).reverse() : [];
        renderAll();
        updateSelects();
    });
}

function login() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();
    if(u === "admin" && p === "23778478") { currentUser = {u: "admin", role: "Administrador"}; }
    else { currentUser = db.users.find(x => x.u === u && x.p === p); }
    if(currentUser) {
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        if(currentUser.role === "Administrador") {
            document.getElementById("form-obra-admin").style.display="block";
            document.getElementById("menu-admin").style.display="block";
            document.getElementById("admin-hrs-status").style.display="block";
        }
    } else alert("Dados incorretos.");
}

function guardarRegistro(mod) {
    const id = editId || Date.now().toString();
    let data = { id, updated: new Date().toLocaleString() };

    if(mod==='obras'){
        data.num = document.getElementById("obra_num").value;
        data.nome = document.getElementById("obra_nome").value;
        data.estado = document.getElementById("obra_estado").value;
        if(!data.num || !data.nome) return alert("Erro nos campos!");
    } else {
        const oId = document.getElementById(`${mod}_obra`).value;
        const obra = db.obras.find(o => o.id === oId);
        if(!obra) return alert("Selecione obra!");
        data.obraId = oId; data.obraNum = obra.num;
        if(mod==='obs'){ data.desc=document.getElementById("obs_desc").value; data.estado=document.getElementById("obs_est").value; }
        if(mod==='ped'){ 
            data.mat=document.getElementById("ped_mat").value; data.qtd=document.getElementById("ped_qtd").value; 
            data.enc=document.getElementById("ped_enc").value; data.guia=document.getElementById("ped_guia").value; data.estado=document.getElementById("ped_est").value;
        }
        if(mod==='tar'){ data.tit=document.getElementById("tar_tit").value; data.para=Array.from(document.getElementById("tar_para").selectedOptions).map(o=>o.value); data.estado=document.getElementById("tar_est").value; }
    }

    rtdb.ref(`${mod}/${id}`).set(data).then(() => {
        crearNotif(`Modificado/Criado em ${mod}: ID ${id}`);
        cancelar(); showToast();
    });
}

function guardarHoras() {
    const d = document.getElementById("hrs_data").value;
    const oId = document.getElementById("hrs_obra").value;
    if(!d || !oId) return alert("Falta data ou obra!");

    const regId = editId || `${currentUser.u}_${d.replace(/-/g,'')}`;
    let reg = db.horas.find(h => h.id === regId) || { id: regId, user: currentUser.u, data: d, estado: "Por aprobar", intervenciones: [] };
    
    const obra = db.obras.find(o => o.id === oId);
    const diff = (new Date(`1970-01-01T${document.getElementById("hrs_fim").value}`) - new Date(`1970-01-01T${document.getElementById("hrs_ini").value}`)) / 3600000;
    
    const sub = { 
        subId: editSubId || Date.now().toString(), obraId: oId, obraNum: obra.num, 
        ini: document.getElementById("hrs_ini").value, fim: document.getElementById("hrs_fim").value, 
        txt: document.getElementById("hrs_txt").value, horas: diff 
    };

    if(editSubId) { const idx = reg.intervenciones.findIndex(i => i.subId === editSubId); reg.intervenciones[idx] = sub; }
    else reg.intervenciones.push(sub);

    if(currentUser.role==='Administrador') reg.estado = document.getElementById("hrs_est_admin").value;
    rtdb.ref(`horas/${regId}`).set(reg).then(() => { cancelar(); showToast(); });
}

function renderAll() {
    // OBRAS
    const foN = document.getElementById("f_o_num").value.toLowerCase();
    const foM = document.getElementById("f_o_nom").value.toLowerCase();
    const foE = document.getElementById("f_o_est").value;
    document.getElementById("lista_obras").innerHTML = db.obras.filter(o => 
        o.num.toLowerCase().includes(foN) && o.nome.toLowerCase().includes(foM) && (!foE || o.estado === foE)
    ).map(o => `<div class="card"><b>${o.num} - ${o.nome}</b> <span class="badge ${o.estado==='Sem efeito'?'status-void':''}">${o.estado}</span>
        <div class="btn-group">${currentUser.role==='Administrador'?`<button class="btn-edit" onclick="prepEdit('obras','${o.id}')">✏️</button><button class="btn-del" onclick="del('obras','${o.id}')">❌</button>`:''}</div></div>`).join("");

    // HORAS
    const fHm = document.getElementById("f_hrs_mes").value;
    const fHa = document.getElementById("f_hrs_ano").value;
    const fHu = document.getElementById("f_hrs_user").value.toLowerCase();
    const fHe = document.getElementById("f_hrs_est").value;
    document.getElementById("lista_horas").innerHTML = db.horas.filter(h => {
        const [y, m] = h.data.split("-");
        return (!fHm || m === fHm) && (!fHa || y === fHa) && h.user.toLowerCase().includes(fHu) && (!fHe || h.estado === fHe);
    }).sort((a,b)=>b.data.localeCompare(a.data)).map(h => {
        const total = h.intervenciones.reduce((acc, i) => acc + i.horas, 0);
        return `<div class="card"><b>📅 ${h.data} - ${h.user}</b> <span class="badge">${h.estado}</span> <b style="float:right">${total.toFixed(2)}h</b>
            ${h.intervenciones.map(i => `<div class="sub-card"><b>${i.obraNum}</b>: ${i.ini}-${i.fim} (${i.horas.toFixed(2)}h)<br>${i.txt}
                ${h.estado!=='Aprovado'||currentUser.role==='Administrador'?`<button onclick="prepEditHrs('${h.id}','${i.subId}')">✏️</button>`:''}</div>`).join("")}
        </div>`;
    }).join("");

    // OBS, PEDIDOS, TAREFAS (Filtros Texto + Estado)
    renderGen('obs', 'lista_obs', 'f_obs_txt', 'f_obs_est', o => `<b>Obra ${o.obraNum}</b>: ${o.desc}`);
    renderGen('ped', 'lista_ped', 'f_ped_txt', 'f_ped_est', o => `<b>Obra ${o.obraNum}</b>: ${o.mat} (Enc: ${o.enc||'N/A'})`);
    renderGen('tar', 'lista_tar', 'f_tar_txt', 'f_tar_est', o => `<b>Obra ${o.obraNum}</b>: ${o.tit}`);

    // NOTIF
    document.getElementById("lista_notif").innerHTML = db.notif.slice(0,20).map(n => `<div class="sub-card"><small>${n.date}</small><br>${n.msg}</div>`).join("");

    // USERS
    const fUt = document.getElementById("f_u_txt").value.toLowerCase();
    document.getElementById("lista_users").innerHTML = db.users.filter(u => u.u.toLowerCase().includes(fUt)).map(u => `
        <div class="card"><b>${u.u}</b> [${u.role}] <button class="btn-del" onclick="del('users','${u.u}')" style="float:right">❌</button></div>`).join("");
}

function renderGen(mod, target, fTxtId, fEstId, temp) {
    const txt = document.getElementById(fTxtId).value.toLowerCase();
    const est = document.getElementById(fEstId).value;
    document.getElementById(target).innerHTML = db[mod].filter(o => 
        (JSON.stringify(o).toLowerCase().includes(txt)) && (!est || o.estado === est)
    ).reverse().map(o => `<div class="card">${temp(o)} <span class="badge ${o.estado==='Sem efeito'?'status-void':''}">${o.estado}</span>
        <div class="btn-group"><button class="btn-edit" onclick="prepEdit('${mod}','${o.id}')">✏️</button></div></div>`).join("");
}

function prepEdit(mod, id) {
    editId = id; show(mod);
    const item = db[mod].find(x => x.id === id);
    if(mod==='obras'){ document.getElementById("obra_num").value=item.num; document.getElementById("obra_nome").value=item.nome; document.getElementById("obra_estado").value=item.estado; }
    if(mod==='obs'){ document.getElementById("obs_obra").value=item.obraId; document.getElementById("obs_desc").value=item.desc; document.getElementById("obs_est").value=item.estado; }
    if(mod==='ped'){ document.getElementById("ped_obra").value=item.obraId; document.getElementById("ped_mat").value=item.mat; document.getElementById("ped_enc").value=item.enc||''; document.getElementById("ped_est").value=item.estado; }
}

function prepEditHrs(id, sId) {
    editId = id; editSubId = sId; show('hrs');
    const r = db.horas.find(h => h.id === id);
    const i = r.intervenciones.find(x => x.subId === sId);
    document.getElementById("hrs_data").value = r.data;
    document.getElementById("hrs_obra").value = i.obraId;
    document.getElementById("hrs_ini").value = i.ini;
    document.getElementById("hrs_fim").value = i.fim;
    document.getElementById("hrs_txt").value = i.txt;
}

function updateSelects() {
    const active = db.obras.filter(o => o.estado === 'Em execução');
    const opt = '<option value="">Selecionar Obra...</option>' + active.map(o => `<option value="${o.id}">${o.num} - ${o.nome}</option>`).join("");
    ['obs_obra','ped_obra','tar_obra','hrs_obra'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = opt; });
    document.getElementById("tar_para").innerHTML = db.users.map(u => `<option value="${u.u}">${u.u}</option>`).join("");
    
    // Anos Filtro
    const anos = [...new Set(db.horas.map(h => h.data.split("-")[0]))].sort();
    document.getElementById("f_hrs_ano").innerHTML = '<option value="">Ano (Todos)</option>' + anos.map(a => `<option value="${a}">${a}</option>`).join("");
}

function guardarUsuario() {
    const u = document.getElementById("u_name").value, p = document.getElementById("u_pass").value, r = document.getElementById("u_role").value;
    if(u && p) rtdb.ref(`users/${u}`).set({u, p, role: r});
}

function crearNotif(msg) { rtdb.ref('notif').push({msg, date: new Date().toLocaleString()}); }
function show(id) { document.querySelectorAll(".sec").forEach(s=>s.style.display="none"); document.getElementById(id).style.display="block"; }
function cancelar() { editId = null; editSubId = null; document.querySelectorAll('input, textarea').forEach(i=>i.value=""); }
function del(path, id) { if(confirm("Apagar permanentemente?")) rtdb.ref(`${path}/${id}`).remove(); }
function logout() { location.reload(); }
function showToast() { const t = document.getElementById("toast"); t.style.display="block"; setTimeout(()=>t.style.display="none", 2000); }
</script>
</body>
</html>
